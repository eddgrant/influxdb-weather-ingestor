# This environment exists to provide the necessary configuration data such that all beans
# can be instantiated for use in @MicronautTest tests. Tests may override these values
# as they require.

checks:
  postcode: AB12 3CD

influxdb:
  bucket: temperature
  org: eddgrant
  token: my-very-secure-influxdb-token
  url: http://influxdb:8086?connectTimeout=5S&readTimeout=5S&writeTimeout=5S

weatherapi:
  api-key: test-api-key

weather:
  provider: weatherapi.com

micronaut:
  http:
    services:
      weatherapi:
        urls:
          - "https://api.weatherapi.com"